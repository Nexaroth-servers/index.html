<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Boutique — Nexaroth</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
<header>
  <a href="index.html">← Retour</a>
  <h1>Boutique — Nexaroth</h1>
</header>

<main>

<section id="auth">
  <h2>Connexion</h2>
  <input id="username" placeholder="Nom d'utilisateur">
  <button id="loginBtn" class="btn">Se connecter</button>
  <p>Utilisateur : <strong id="userLabel">Aucun</strong></p>
</section>

<section id="balance">
  <h2>Solde</h2>
  <p>Vote : <strong id="vote">0</strong></p>
  <p>Donation : <strong id="donation">0</strong></p>
</section>

<section id="shop">
  <h2>Catalogue</h2>
  <div id="grid" class="shop-grid"></div>
</section>

</main>

<script>
const API = "";
let state = {
  token: localStorage.getItem("nx_token"),
  user: localStorage.getItem("nx_user"),
  vote: 0,
  donation: 0
};

const el = (id) => document.getElementById(id);

function saveAuth(token, user) {
  state.token = token;
  state.user = user;
  localStorage.setItem("nx_token", token);
  localStorage.setItem("nx_user", user);
  el("userLabel").textContent = user;
  loadBalance();
}

async function api(path, options = {}) {
  try {
    const res = await fetch(API + path, {
      ...options,
      headers: {
        "Content-Type": "application/json",
        ...(state.token ? { Authorization: "Bearer " + state.token } : {}),
        ...(options.headers || {})
      }
    });
    return await res.json();
  } catch (e) {
    return null;
  }
}

/* ---------------- AUTH ---------------- */

el("loginBtn").onclick = async () => {
  const username = el("username").value.trim();
  if (!username) return alert("Nom requis");

  const res = await api("/api/login", {
    method: "POST",
    body: JSON.stringify({ username })
  });

  if (res?.token) {
    saveAuth(res.token, res.user_id);
  } else {
    // fallback demo
    saveAuth("demo-" + Date.now(), username);
  }
};

/* ---------------- BALANCE ---------------- */

async function loadBalance() {
  if (!state.token) return;

  const res = await api("/api/balance");

  if (res) {
    state.vote = res.vote || 0;
    state.donation = res.donation || 0;
  }

  el("vote").textContent = state.vote;
  el("donation").textContent = state.donation;
}

/* ---------------- SHOP ---------------- */

const ITEMS = [
  { id:"mount_fly", name:"Griffon Arcanique", cat:"mount", vote:120, donation:1200 },
  { id:"mount_ground", name:"Destrier Runique", cat:"mount", vote:80, donation:800 },
  { id:"transmog_knight", name:"Armure du Chevalier", cat:"transmog", vote:60, donation:600 },
  { id:"gold_100k", name:"Pack 100k Gold", cat:"gold", vote:40, donation:400 },
];

function render() {
  const grid = el("grid");
  grid.innerHTML = "";

  ITEMS.forEach(i => {
    const div = document.createElement("div");
    div.className = "shop-item";

    div.innerHTML = `
      <h3>${i.name}</h3>
      <p>${i.cat}</p>
      <p>Vote: ${i.vote} | Donation: ${i.donation}</p>
      <button class="btn vote">Acheter vote</button>
      <button class="btn don">Acheter don</button>
    `;

    div.querySelector(".vote").onclick = () => buy(i.id, "vote");
    div.querySelector(".don").onclick = () => buy(i.id, "donation");

    grid.appendChild(div);
  });
}

async function buy(id, method) {
  if (!state.token) return alert("Connecte-toi");

  const res = await api("/api/purchase", {
    method: "POST",
    body: JSON.stringify({ item_id: id, method })
  });

  if (res?.ok) {
    alert("Achat effectué");
    loadBalance();
  } else {
    alert("Erreur achat");
  }
}

/* ---------------- INIT ---------------- */

if (state.user) el("userLabel").textContent = state.user;

render();
loadBalance();

</script>

</body>
</html>
