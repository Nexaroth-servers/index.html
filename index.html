<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NEXAROTH - Wrath of the Lich King</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
}

body{
font-family:Arial,sans-serif;
color:white;
overflow-x:hidden;
background:#050b12;
}

/* MENU */

.navbar{
position:fixed;
top:0;
left:0;
width:100%;
padding:20px 50px;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(0,0,0,.85);
backdrop-filter:blur(10px);
z-index:1000;
}

.logo{
font-family:'Cinzel',serif;
font-size:36px;
color:#7ce8ff;
text-shadow:0 0 15px #00bfff;
}

nav{
display:flex;
gap:20px;
}

nav a{
color:white;
text-decoration:none;
transition:.3s;
}

nav a:hover{
color:#7ce8ff;
}

/* HERO */

.hero{
height:100vh;

background:
linear-gradient(rgba(0,0,0,.35),rgba(0,0,0,.85)),
url("https://image.noelshack.com/fichiers/2026/25/5/1781893960-19-juin-2026-13-h-45-min-16-s.jpg");

background-size:cover;
background-position:center;
background-repeat:no-repeat;

display:flex;
justify-content:center;
align-items:center;
text-align:center;

animation:zoomHero 15s ease-in-out infinite alternate;
}

@keyframes zoomHero{
from{
background-size:100%;
}
to{
background-size:115%;
}
}

.hero h1{
font-family:'Cinzel',serif;
font-size:90px;
color:#dff8ff;
text-shadow:
0 0 10px #00bfff,
0 0 30px #00bfff,
0 0 60px #00bfff;
}

.hero p{
font-size:24px;
margin:20px 0;
}

.btn{
display:inline-block;
padding:15px 35px;
margin:10px;
background:#0099ff;
color:white;
text-decoration:none;
border-radius:8px;
transition:.3s;
}

.btn:hover{
transform:translateY(-3px);
box-shadow:0 0 20px #00bfff;
}

/* CONTENU */

.container{
max-width:1200px;
margin:auto;
padding:100px 20px;
}

.title{
text-align:center;
font-size:42px;
font-family:'Cinzel',serif;
color:#7ce8ff;
margin-bottom:40px;
}

.card{
background:#101820;
padding:30px;
border-radius:12px;
text-align:center;
}

/* TELECHARGEMENT */

.download-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
margin-top:25px;
}

/* FOOTER */

footer{
background:#000;
padding:30px;
text-align:center;
color:#999;
}

/* NEIGE */

.snow{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
opacity:.15;
background-image:
radial-gradient(white 1px, transparent 1px);
background-size:40px 40px;
animation:snowMove 15s linear infinite;
}

@keyframes snowMove{
from{
transform:translateY(-100px);
}
to{
transform:translateY(100vh);
}
}

</style>
</head>

<body>

<div class="snow"></div>

<header class="navbar">

<div class="logo">NEXAROTH</div>

<nav>
<a href="#accueil">Accueil</a>
<a href="#telechargement">Téléchargement</a>

<a href="https://discord.gg/zcH3JXHeuQ"
target="_blank">
Discord
</a>
</nav>

</header>

<section class="hero" id="accueil">

<div>

<h1>NEXAROTH</h1>

<p>
World of Warcraft<br>
Wrath of the Lich King 3.3.5a HD
</p>

<a href="#telechargement" class="btn">
📥 Télécharger
</a>

</div>

</section>

<section id="telechargement">

<div class="container">

<h2 class="title">Téléchargements</h2>

<div class="card">

<h3>Choisissez votre langue</h3>

<div class="download-grid">

<a class="btn"
href="https://drive.google.com/file/d/1hE1X41DnWJ3wu1O_xzKaTCAZAi2SyDiR/view"
target="_blank">
🇫🇷 Français
</a>

<a class="btn"
href="https://drive.google.com/file/d/1zcvTIhu-rKSRrGkzRsAmTfJ-Ik48C5-S/view"
target="_blank">
🇬🇧 English
</a>

<a class="btn"
href="https://drive.google.com/file/d/1vfDM2mvsn4-Q5zD3x8VO_6BUzPpLHfxC/view"
target="_blank">
🇪🇸 Español
</a>

<a class="btn"
href="https://drive.google.com/file/d/1zfKUEOMti-pUVJnr8pfhEwTqLG6baanJ/view"
target="_blank">
🇩🇪 Deutsch
</a>

<a class="btn"
href="https://drive.google.com/file/d/1ykz3I97ajwjAqkbZ4cDNrTtBdho6MBtj/view"
target="_blank">
🇷🇺 Русский
</a>

</div>

</div>

</div>

</section>

<footer>

<h2>NEXAROTH</h2>

<p>Wrath of the Lich King 3.3.5a HD</p>

<p>© 2026 Tous droits réservés</p>

</footer>

</body>
</html>
