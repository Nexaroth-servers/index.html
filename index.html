<!doctype html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexaroth - WoW Private Server</title>
    <style>
        /* Styles généraux */
        body {
            background-color: #020611;
            color: #e0e6ed;
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background-image: linear-gradient(to bottom, rgba(2, 6, 17, 0) 0%, rgba(2, 6, 17, 0.4) 30%, rgba(2, 6, 17, 0.85) 60%, #020611 100%), 
                              url('https://ibb.co');
            background-size: 100% auto;
            background-position: top center;
            background-repeat: no-repeat;
            background-attachment: scroll;
        }

        @media (max-width: 1024px) {
            body {
                background-size: cover;
                background-attachment: fixed;
            }
        }

        a {
            text-decoration: none;
            color: #4cb5ff;
            transition: all 0.3s ease;
        }

        a:hover {
            color: #fff;
            text-shadow: 0 0 10px rgba(76, 181, 255, 0.6);
        }

        /* Barre de navigation */
        header {
            background: rgba(2, 6, 17, 0.75);
            border-bottom: 1px solid rgba(26, 50, 74, 0.4);
            display: flex;
            justify-content: space-around;
            padding: 15px;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(5px);
            flex-wrap: wrap;
            gap: 15px;
        }

        header nav {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }

        header nav a {
            margin: 5px 12px;
            text-transform: uppercase;
            font-size: 13px;
            letter-spacing: 1px;
            transition: color 0.3s;
            cursor: pointer;
        }

        header nav a:hover {
            color: #4cb5ff;
        }

        /* Widget Joueurs en ligne */
        .server-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: rgba(5, 15, 28, 0.8);
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid rgba(76, 181, 255, 0.3);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: #2ec4b6;
            border-radius: 50%;
            box-shadow: 0 0 8px #2ec4b6;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(46, 196, 182, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(46, 196, 182, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(46, 196, 182, 0); }
        }

        /* Sélection de langue */
        .lang-select {
            background: rgba(7, 18, 33, 0.9);
            border: 1px solid rgba(28, 61, 90, 0.6);
            color: #4cb5ff;
            padding: 6px 12px;
            font-size: 13px;
            border-radius: 4px;
            cursor: pointer;
            outline: none;
        }

        /* Conteneur principal */
        .main-container {
            max-width: 1000px;
            margin: 60px auto;
            padding: 0 20px;
        }

        /* Configuration des Panneaux de l'interface */
        .grid-hero {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 30px;
            margin-bottom: 40px;
        }

        .grid-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 40px;
        }

        @media (max-width: 850px) {
            .grid-hero, .grid-content { grid-template-columns: 1fr; }
        }

        .panel {
            background: rgba(7, 18, 33, 0.6);
            border: 1px solid rgba(26, 50, 74, 0.4);
            border-radius: 8px;
            padding: 30px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        .panel h2 {
            font-family: 'Georgia', serif;
            color: #f8b700;
            text-shadow: 0 0 15px rgba(248, 183, 0, 0.3);
            margin-top: 0;
            margin-bottom: 25px;
            text-align: center;
        }

        /* Container Téléchargements avec 5 Liens Google Drive */
        .download-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .wow-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 14px;
            font-size: 13px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 4px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.4);
            cursor: pointer;
            text-align: center;
        }

        /* Variations des couleurs des boutons */
        .dl-1 { background: linear-gradient(135deg, #11538c 0%, #062445 100%); border: 1px solid #4cb5ff; color: #fff; }
        .dl-1:hover { background: linear-gradient(135deg, #1d6cb2 0%, #0d3866 100%); box-shadow: 0 0 15px rgba(76, 181, 255, 0.5); }

        .dl-2, .dl-3, .dl-4, .dl-5 { background: linear-gradient(135deg, #b78a28 0%, #684a0c 100%); border: 1px solid #f8b700; color: #fff; }
        .dl-2:hover, .dl-3:hover, .dl-4:hover, .dl-5:hover { background: linear-gradient(135deg, #d4a73b 0%, #855f14 100%); box-shadow: 0 0 15px rgba(248, 183, 0, 0.5); }

        /* Formulaires d'authentification */
        .auth-tabs { display: flex; border-bottom: 1px solid rgba(26, 50, 74, 0.5); margin-bottom: 20px; }
        .auth-tab { flex: 1; padding: 10px; text-align: center; cursor: pointer; color: #8fa3b7; text-transform: uppercase; font-size: 12px; letter-spacing: 0.5px; }
        .auth-tab.active { color: #f8b700; border-bottom: 2px solid #f8b700; font-weight: bold; }
        
        .auth-form { display: none; flex-direction: column; gap: 15px; }
        .auth-form.active { display: flex; }
        
        .form-group { display: flex; flex-direction: column; gap: 5px; }
        .form-group label { font-size: 11px; text-transform: uppercase; color: #8fa3b7; }
        .form-group input { background: rgba(2, 6, 17, 0.8); border: 1px solid rgba(28, 61, 90, 0.8); padding: 10px; color: #fff; border-radius: 4px; outline: none; }
        .form-group input:focus { border-color: #4cb5ff; }
        
        .btn-submit-form { background: linear-gradient(135deg, #a72828 0%, #5a0c0c 100%); border: 1px solid #ff4c4c; color: #fff; width: 100%; margin-top: 5px; cursor: pointer; }
        .btn-submit-form:hover { background: linear-gradient(135deg, #c43333 0%, #751414 100%); box-shadow: 0 0 15px rgba(255, 76, 76, 0.4); }

        /* Actualités / Forum */
        .item-list { display: flex; flex-direction: column; gap: 15px; }
        .item-card { background: rgba(7, 18, 33, 0.4); border: 1px solid rgba(26, 50, 74, 0.3); border-radius: 6px; padding: 15px; }
        .item-meta { font-size: 11px; color: #4cb5ff; text-transform: uppercase; margin-bottom: 5px; }
        .item-card h3 { margin: 0 0 5px 0; font-size: 16px; color: #fff; }
        .item-card p { margin: 0; font-size: 13px; color: #a0aec0; line-height: 1.4; }

        /* Structure Modale */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(2, 6, 17, 0.9); z-index: 2000; justify-content: center; align-items: center; backdrop-filter: blur(8px);
        }
        .modal-content {
            background: #071221; border: 1px solid #1c3d5a; box-shadow: 0 0 30px rgba(0,0,0,0.8);
            width: 90%; max-width: 700px; border-radius: 8px; padding: 25px; position: relative;
        }
        .close-modal { position: absolute; top: 15px; right: 20px; font-size: 24px; color: #8fa3b7; cursor: pointer; }
        .close-modal:hover { color: #fff; }

        .wow-table { width: 100%; border-collapse: collapse; margin-top: 15px; text-align: left; }
        .wow-table th { background: rgba(26, 50, 74, 0.5); color: #f8b700; padding: 10px; font-size: 12px; text-transform: uppercase; }
        .wow-table td { padding: 10px; border-bottom: 1px solid rgba(26, 50, 74, 0.3); font-size: 14px; }

        /* Pied de page */
        footer { background: #01040a; border-top: 1px solid rgba(26, 50, 74, 0.4); padding: 40px 20px; text-align: center; font-size: 12px; color: #627284; }
        .footer-links { margin-bottom: 15px; }
        .footer-links a { margin: 0 10px; color: #8fa3b7; }
        .footer-links a:hover { color: #4cb5ff; }
        .legal-notice { max-width: 800px; margin: 0 auto; font-size: 11px; }
    </style>
</head>
