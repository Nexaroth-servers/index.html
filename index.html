<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXAROTH - Wrath of the Lich King</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #020611;
            --bg-card: #071221;
            --primary: #4cb5ff;
            --primary-hover: rgba(76, 181, 255, .08);
            --accent: #f8b700;
            --accent-glow: rgba(248, 183, 0, .7);
            --border: rgba(76, 181, 255, .15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg-dark);
            font-family: 'Cinzel', serif;
            color: #fff;
            overflow-x: hidden;
            top: 0 !important;
        }

        .skiptranslate, .goog-te-banner-frame {
            display: none !important;
        }
        body {
            top: 0px !important;
        }

        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 80px;
            background: rgba(0, 0, 0, .85);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            z-index: 999;
            border-bottom: 1px solid rgba(248, 183, 0, .25);
        }

        .logo {
            font-size: 38px;
            font-weight: 700;
            color: var(--accent);
            text-shadow: 0 0 20px var(--accent-glow);
        }

        nav {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }

        nav a {
            color: #ffffff;
            text-decoration: none;
            font-size: 13px;
            text-transform: uppercase;
            padding: 8px 12px;
            border-radius: 4px;
            transition: all .3s ease;
        }

        nav a:hover {
            color: var(--primary);
            background: var(--primary-hover);
        }

        .translate-wrapper {
            position: relative;
            display: inline-block;
            margin-left: 10px;
        }

        .translate-select {
            background: rgba(5, 15, 28, 0.95);
            border: 1px solid var(--border);
            color: #fff;
            padding: 8px 12px;
            font-family: 'Segoe UI', sans-serif;
            font-size: 13px;
            border-radius: 4px;
            cursor: pointer;
            outline: none;
            transition: all 0.3s ease;
        }

        .translate-select:hover {
            border-color: var(--primary);
            background: var(--primary-hover);
        }

        .hero {
            height: 100vh;
            background: linear-gradient(rgba(0, 0, 0, .25), rgba(0, 0, 0, .85)), url('lichking.jpg') center/cover no-repeat;
            display: flex;
            align-items: center;
            padding: 0 10%;
        }

        .hero-content {
            max-width: 700px;
        }

        .hero h1 {
            font-size: 100px;
            color: #dbe7ff;
            text-shadow: 0 0 20px rgba(255, 255, 255, .5), 0 0 40px rgba(76, 181, 255, .4);
        }

        .hero h2 {
            font-size: 32px;
            color: var(--primary);
            margin: 15px 0;
        }

        .hero p {
            font-size: 18px;
            margin-bottom: 30px;
        }

        .btn {
            display: inline-block;
            padding: 15px 35px;
            border-radius: 5px;
            font-weight: bold;
            text-decoration: none;
            margin-right: 10px;
            cursor: pointer;
            border: none;
            transition: all 0.3s ease;
        }

        .btn-download {
            background: linear-gradient(#d4a73b, #7a5107);
            border: 1px solid var(--accent);
            color: white;
        }

        .btn-download:hover {
            box-shadow: 0 0 15px rgba(248, 183, 0, 0.4);
            transform: translateY(-2px);
        }

        .btn-discord {
            background: linear-gradient(#1d6cb2, #082a4d);
            border: 1px solid var(--primary);
            color: white;
        }

        .btn-discord:hover {
            box-shadow: 0 0 15px rgba(76, 181, 255, 0.4);
            transform: translateY(-2px);
        }

        .vote-box {
            text-align: center;
            padding: 20px;
            background: linear-gradient(135deg, rgba(248,183,0,0.05) 0%, transparent 100%);
            border: 1px solid rgba(248,183,0,0.2);
            border-radius: 6px;
            box-shadow: 0 0 10px rgba(248, 183, 0, 0.05);
            transition: all 0.3s ease;
        }

        .vote-box:hover {
            border-color: rgba(248,183,0,0.6);
            box-shadow: 0 0 20px rgba(248, 183, 0, 0.15);
        }

        .btn-vote {
            display: inline-block;
            width: 100%;
            padding: 12px;
            background-color: var(--accent);
            color: #000;
            font-weight: bold;
            text-transform: uppercase;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            text-align: center;
            position: relative;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
            text-decoration: none;
        }

        .btn-vote:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(248, 183, 0, 0.4);
        }

        .btn-vote::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -60%;
            width: 30%;
            height: 200%;
            background: rgba(255, 255, 255, 0.3);
            transform: rotate(25deg);
            transition: none;
        }

        .btn-vote:hover::after {
            left: 120%;
            transition: all 0.6s ease-in-out;
        }

        .form-group {
            margin-bottom: 15px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.9rem;
            color: #8fa3b7;
        }

        .form-control {
            width: 100%;
            padding: 12px;
            background-color: #020611;
            border: 1px solid rgba(76, 181, 255, .2);
            border-radius: 4px;
            color: #fff;
            font-size: 1rem;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 5px rgba(76, 181, 255, 0.3);
        }

        .stats {
            margin-top: -60px;
            padding: 0 5%;
            position: relative;
            z-index: 10;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 20px;
        }

        .stat-box {
            background: rgba(5, 15, 28, .95);
            padding: 25px;
            text-align: center;
            border-radius: 8px;
            border: 1px solid rgba(76, 181, 255, .25);
        }

        .stat-box h3 {
            font-size: 14px;
            margin-bottom: 10px;
            color: #8fa3b7;
        }

        .stat-box span {
            font-size: 28px;
            color: #2ec4b6;
            font-weight: bold;
        }

        section {
            padding: 80px 8%;
            scroll-margin-top: 80px;
        }

        .section-title {
            text-align: center;
            font-size: 42px;
            margin-bottom: 50px;
            color: var(--accent);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
        }

        .card {
            background: var(--bg-card);
            padding: 25px;
            border-radius: 10px;
            border: 1px solid var(--border);
        }

        .card h3 {
            margin-bottom: 20px;
            color: var(--accent);
        }

        .news-item {
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, .08);
        }

        .news-item:last-child {
            border: none;
        }

        .download-list a, .download-list button {
            display: block;
            width: 100%;
            padding: 15px;
            margin-bottom: 10px;
            background: #0b1d31;
            border-radius: 5px;
            text-decoration: none;
            color: white;
            border: 1px solid rgba(76, 181, 255, .2);
            text-align: left;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        .download-list a:hover {
            border-color: var(--primary);
            background: rgba(76, 181, 255, .05);
        }

        .download-list button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .features {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }

        .feature {
            background: var(--bg-card);
            padding: 25px;
            border-radius: 10px;
            border: 1px solid var(--border);
        }

        footer {
            background: #01040a;
            padding: 40px;
            text-align: center;
            border-top: 1px solid rgba(255, 255, 255, .08);
        }

        footer p {
            margin: 10px 0;
        }

        @media(max-width:1200px){
            header { height: auto; padding: 15px 20px; flex-direction: column; gap: 15px; }
            section { padding-top: 140px; }
        }

        @media(max-width:1000px){
            .stats-grid { grid-template-columns: 1fr 1fr; }
