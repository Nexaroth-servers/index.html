<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexaroth - Wrath of the Lich King 3.3.5a</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        /* Réinitialisation globale */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Montserrat', sans-serif;
            background: #02070f url('https://noelshack.com') no-repeat top center;
            background-size: contain;
            color: #cdd6e2;
            overflow-x: hidden;
            line-height: 1.5;
        }
        a {
            color: inherit;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        /* Conteneur principal */
        .wrapper {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Barre de navigation supérieure */
        .top-nav {
            background: rgba(2, 7, 15, 0.85);
            backdrop-filter: blur(5px);
            border-bottom: 1px solid rgba(0, 187, 255, 0.15);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .top-nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 60px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }
        .nav-logo {
            font-family: 'Cinzel', serif;
            font-size: 20px;
            color: #79d2ff;
            font-weight: bold;
            letter-spacing: 1px;
        }
        .nav-links {
            display: flex;
            gap: 20px;
            font-size: 12px;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        .nav-links a:hover {
            color: #00bfff;
            text-shadow: 0 0 8px rgba(0, 191, 255, 0.6);
        }

        /* Section Hero */
        .hero {
            padding: 100px 0 60px 0;
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 40px;
            align-items: center;
        }
        .hero-left {
            text-align: left;
        }
        .main-title {
            font-family: 'Cinzel', serif;
            font-size: 72px;
            color: #ffffff;
            letter-spacing: 4px;
            text-shadow: 0 0 20px rgba(0, 187, 255, 0.4);
            line-height: 1;
            margin-bottom: 5px;
        }
        .sub-title {
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #8fa4be;
            margin-bottom: 40px;
        }
        .hero-buttons {
            display: grid;
            grid-template-columns: repeat(2, 200px);
            gap: 15px;
        }
        .btn {
            background: rgba(10, 25, 47, 0.6);
            border: 1px solid rgba(0, 187, 255, 0.3);
            padding: 14px 20px;
            border-radius: 4px;
            font-size: 13px;
            text-transform: uppercase;
            font-weight: 600;
            text-align: center;
            letter-spacing: 1px;
            box-shadow: inset 0 0 10px rgba(0, 187, 255, 0.05);
        }
        .btn:hover {
            border-color: #00bfff;
            box-shadow: 0 0 15px rgba(0, 191, 255, 0.3), inset 0 0 15px rgba(0, 191, 255, 0.1);
            transform: translateY(-2px);
            color: #ffffff;
        }

        /* Encadré d'inscription à droite */
        .side-panel {
            background: rgba(3, 13, 27, 0.8);
            border: 1px solid rgba(0, 187, 255, 0.2);
            border-radius: 6px;
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .side-panel h3 {
            font-family: 'Cinzel', serif;
            font-size: 16px;
            color: #ffffff;
            margin-bottom: 25px;
            letter-spacing: 1px;
        }
        .side-panel-logo {
            width: 60px;
            height: 60px;
            margin: 0 auto 25px auto;
            background: radial-gradient(circle, rgba(0, 191, 255, 0.2) 0%, transparent 70%);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .side-panel-logo img {
            width: 35px;
            filter: drop-shadow(0 0 8px #00bfff);
        }
        .features-list {
            list-style: none;
            text-align: left;
            font-size: 12px;
            color: #8fa4be;
            padding: 0 10px;
        }
        .features-list li {
            margin-bottom: 12px;
            position: relative;
            padding-left: 20px;
        }
        .features-list li::before {
            content: "✓";
            position: absolute;
            left: 0;
            color: #00bfff;
        }

        /* Section Statistiques globales */
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            background: rgba(3, 13, 27, 0.6);
            border: 1px solid rgba(0, 187, 255, 0.15);
            padding: 25px;
            border-radius: 6px;
            margin-bottom: 60px;
        }
        .stat-item {
            text-align: center;
        }
        .stat-number {
            font-size: 28px;
            font-weight: 600;
            color: #ffffff;
            text-shadow: 0 0 10px rgba(0, 191, 255, 0.3);
        }
        .stat-label {
            font-size: 11px;
            text-transform: uppercase;
            color: #647b9c;
            letter-spacing: 1px;
            margin-top: 5px;
        }

        /* Titres de Section */
        .section-title {
            font-family: 'Cinzel', serif;
            font-size: 18px;
            text-align: center;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 35px;
            position: relative;
        }
        .section-title::after {
            content: '';
            display: block;
            width: 100px;
            height: 1px;
            background: linear-gradient(90deg, transparent, #00bfff, transparent);
            margin: 8px auto 0 auto;
        }

        /* Section Téléchargement Client */
        .download-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
            margin-bottom: 60px;
        }
        .lang-card {
            background: rgba(3, 13, 27, 0.5);
            border: 1px solid rgba(0, 187, 255, 0.1);
            border-radius: 4px;
            padding: 20px 10px;
            text-align: center;
        }
        .lang-card:hover {
            border-color: rgba(0, 191, 255, 0.4);
            background: rgba(3, 13, 27, 0.8);
        }
        .lang-name {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #8fa4be;
            margin-bottom: 15px;
        }
        .btn-sm {
            display: block;
            padding: 8px 0;
            font-size: 10px;
            border-radius: 3px;
        }

        /* Section Accès Rapide */
        .quick-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
            margin-bottom: 60px;
        }
        .quick-card {
            background: rgba(3, 13, 27, 0.5);
            border: 1px solid rgba(0, 187, 255, 0.1);
            border-radius: 4px;
            padding: 30px 15px;
            text-align: center;
            display: block;
        }
        .quick-card:hover {
            border-color: #00bfff;
            box-shadow: inset 0 0 15px rgba(0, 191, 255, 0.1);
            transform: translateY(-3px);
        }
        .quick-icon {
            font-size: 24px;
            color: #00bfff;
            margin-bottom: 15px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .quick-card h4 {
            font-size: 12px;
            text-transform: uppercase;
            color: #ffffff;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }
        .quick-card p {
            font-size: 11px;
            color: #647b9c;
        }

        /* Section Actualités & Classements */
        .bottom-layout {
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 40px;
            margin-bottom: 60px;
        }
        .news-column h2, .ladder-column h2 {
            text-align: left;
        }
        .news-column h2::after, .ladder-column h2::after {
            margin: 8px 0 0 0;
            background: linear-gradient(90deg, #00bfff, transparent);
        }
        .news-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }
        .news-card {
            background: rgba(3, 13, 27, 0.5);
            border: 1px solid rgba(0, 187, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
        }
        .news-img {
            width: 100%;
            height: 110px;
            background-size: cover;
            background-position: center;
            border-bottom: 1px solid rgba(0, 187, 255, 0.1);
        }
        .news-content {
            padding: 15px;
        }
        .news-tag {
            font-size: 9px;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }
        .tag-new { color: #ff9900; }
        .tag-event { color: #a335ee; }
