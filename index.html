<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexaroth - WoW Private Server</title>
    <style>
        /* Styles Généraux */
        body {
            background-color: #020611;
            color: #e0e6ed;
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            /* Utilisation de l'image exacte envoyée configurée en plein écran */
            background-image: 
                linear-gradient(to bottom, rgba(2, 6, 17, 0.1) 0%, rgba(2, 6, 17, 0.4) 30%, rgba(2, 6, 17, 0.85) 75%, #020611 100%), 
                url('https://blzmd.com');
            background-size: 100% auto;
            background-position: top center;
            background-repeat: no-repeat;
            background-attachment: scroll;
        }
        @media (max-width: 1024px) {
            body { background-size: cover; background-attachment: fixed; }
        }
        a { text-decoration: none; color: inherit; }
        
        /* Barre de Navigation */
        header {
            background: rgba(2, 6, 17, 0.75);
            border-bottom: 1px solid rgba(26, 50, 74, 0.4);
            display: flex;
            justify-content: space-around;
            padding: 15px;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }
        header nav a {
            margin: 0 15px;
            text-transform: uppercase;
            font-size: 13px;
            letter-spacing: 1px;
            transition: color 0.3s;
        }
        header nav a:hover { color: #4cb5ff; }

        /* Bouton Sélection de Langue */
        .lang-select {
            background: rgba(7, 18, 33, 0.6);
            border: 1px solid rgba(28, 61, 90, 0.6);
            color: #4cb5ff;
            padding: 6px 12px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            outline: none;
        }
        .lang-select option {
            background: #020611;
            color: #e0e6ed;
        }

        /* Section Hero */
        .hero {
            text-align: center;
            padding: 180px 20px 140px;
        }
        .hero h1 {
            font-size: 76px;
            color: #a3d8f4;
            text-shadow: 0 0 30px rgba(163, 216, 244, 0.8), 2px 2px 12px rgba(0,0,0,0.9);
            margin: 0;
            letter-spacing: 8px;
            font-family: 'Georgia', serif;
        }
        .hero p { font-size: 20px; color: #7ab0d5; margin-top: 15px; font-weight: bold; text-shadow: 2px 2px 5px rgba(0,0,0,0.9); }
        
        /* Boutons */
        .btn-group { margin-top: 35px; }
        .btn {
            background: linear-gradient(180deg, rgba(27, 58, 87, 0.8), rgba(13, 32, 51, 0.8));
            border: 1px solid #386b99;
            color: #fff;
            padding: 12px 25px;
            margin: 6px;
            display: inline-block;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 12px;
            font-weight: bold;
            transition: all 0.3s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .btn:hover {
            border-color: #4cb5ff;
            box-shadow: 0 0 15px rgba(76, 181, 255, 0.6);
            transform: translateY(-2px);
        }

        /* Statistiques */
        .stats-container {
            display: flex;
            justify-content: center;
            background: rgba(5, 13, 24, 0.4);
            border-top: 1px solid rgba(26, 50, 74, 0.3);
            border-bottom: 1px solid rgba(26, 50, 74, 0.3);
            padding: 30px 0;
            backdrop-filter: blur(8px);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.6);
        }
        .stat-box { text-align: center; margin: 0 50px; }
        .stat-number { font-size: 32px; color: #4cb5ff; font-weight: bold; text-shadow: 0 0 15px rgba(76,181,255,0.5); }
        .stat-label { font-size: 11px; color: #8fa3b5; text-transform: uppercase; margin-top: 5px; letter-spacing: 1px; }

        .section-title {
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin: 80px 0 40px;
            color: #a3d8f4;
            font-size: 24px;
        }

        .grid {
            display: flex;
            justify-content: center;
            gap: 15px;
            max-width: 1100px;
            margin: 0 auto 80px;
            padding: 0 20px;
        }

        .card {
            background: rgba(7, 18, 33, 0.4);
            border: 1px solid rgba(28, 61, 90, 0.4);
            padding: 25px;
            text-align: center;
            flex: 1;
            backdrop-filter: blur(4px);
            transition: all 0.3s;
        }
        .card:hover { border-color: #4cb5ff; transform: translateY(-3px); background: rgba(9, 23, 41, 0.7); }
        .card h3 { margin: 0 0 10px 0; font-size: 18px; color: #fff; }
        .card p { margin: 0 0 15px 0; font-size: 13px; color: #8fa3b5; }

        .register-box {
            max-width: 400px;
            margin: 0 auto 80px;
            background: rgba(7, 18, 33, 0.5);
            border: 1px solid rgba(28, 61, 90, 0.4);
            padding: 30px;
            backdrop-filter: blur(4px);
        }
        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 12px; color: #7ab0d5; text-transform: uppercase; }
        .form-group input { width: 100%; padding: 12px; background: rgba(2, 6, 17, 0.8); border: 1px solid rgba(28, 61, 90, 0.6); color: #fff; box-sizing: border-box; }

        /* Mises en page basses */
        .bottom-layout { display: flex; max-width: 1100px; margin: 0 auto 80px; gap: 30px; padding: 0 20px; }
        .news-section { flex: 2; }
        .sidebar-section { flex: 1; }
        .news-list { display: flex; flex-direction: column; gap: 20px; }
        .news-card { background: rgba(7, 18, 33, 0.4); border: 1px solid rgba(28, 61, 90, 0.4); border-radius: 4px; overflow: hidden; display: flex; backdrop-filter: blur(4px); }
        .news-image { width: 180px; min-height: 140px; background-size: cover; background-position: center; position: relative; }
        .news-badge { position: absolute; top: 10px; left: 10px; background: rgba(7, 18, 33, 0.85); border: 1px solid #386b99; color: #4cb5ff; padding: 3px 8px; font-size: 10px; text-transform: uppercase; font-weight: bold; }
        .news-content { padding: 15px 20px; text-align: left; flex: 1; }
        .news-content h4 { margin: 0 0 8px 0; color: #fff; font-size: 18px; }
        .news-content p { margin: 0 0 12px 0; color: #8fa3b5; font-size: 13px; line-height: 1.4; }
        .news-date { font-size: 11px; color: #566f85; text-transform: uppercase; }

        .ranking-box { background: rgba(7, 18, 33, 0.4); border: 1px solid rgba(28, 61, 90, 0.4); border-radius: 4px; padding: 20px; backdrop-filter: blur(4px); }
        .ranking-tabs { display: flex; border-bottom: 1px solid rgba(28, 61, 90, 0.5); margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 10px; background: none; border: none; color: #8fa3b5; font-weight: bold; font-size: 12px; text-transform: uppercase; }
        .tab-btn.active { color: #4cb5ff; border-bottom: 2px solid #4cb5ff; }
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 13px; }
        th { color: #7ab0d5; padding: 10px; font-size: 11px; border-bottom: 1px solid rgba(28, 61, 90, 0.3); text-transform: uppercase; }
        td { padding: 10px; border-bottom: 1px solid rgba(28, 61, 90, 0.2); }
        .rank-num { color: #4cb5ff; font-weight: bold; }
        .rating { color: #a3d8f4; font-weight: bold; text-align: right; }

        /* Module de Chat Intégré (Nouveauté) */
        .chat-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 320px;
            background: rgba(7, 18, 33, 0.95);
            border: 1px solid rgba(76, 181, 255, 0.4);
            border-radius: 6px 6px 0 0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            z-index: 2000;
            font-size: 13px;
        }
        .chat-header {
            background: linear-gradient(180deg, #1b3a57, #0d2033);
            padding: 12px;
            font-weight: bold;
            color: #a3d8f4;
            border-bottom: 1px solid rgba(76, 181, 255, 0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            border-radius: 5px 5px 0 0;
        }
        .chat-body {
            height: 250px;
            padding: 10px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: rgba(2, 6, 17, 0.9);
        }
        .chat-msg { padding: 8px 12px; border-radius: 4px; max-width: 80%; line-height: 1.4; }
        .chat-msg.server { background: rgba(27, 58, 87, 0.5); align-self: flex-start; color: #4cb5ff; border: 1px solid rgba(76,181,255,0.2); }
        .chat-msg.player { background: rgba(35, 82, 124, 0.4); align-self: flex-end; color: #fff; border: 1px solid rgba(255,255,255,0.1); }
        .chat-msg span { display: block; font-size: 10px; color: #566f85; margin-bottom: 3px; font-weight: bold; }
        .chat-footer {
            display: flex;
            border-top: 1px solid rgba(28, 61, 90, 0.6);
            background: #071221;
        }
        .chat-footer input {
            flex: 1; padding: 12px; background: transparent; border: none; color: #fff; outline: none;
        }
