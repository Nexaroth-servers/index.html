<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Téléchargements Client - Nexaroth</title>
    <style>
        body {
            background-color: #020611;
            color: #e0e6ed;
            font-family: 'Arial', sans-serif;
            text-align: center;
            padding: 80px 20px;
            background-image: linear-gradient(to bottom, rgba(2, 6, 17, 0.4) 0%, rgba(2, 6, 17, 0.8) 60%, #020611 100%), url('https://blzmd.com');
            background-size: cover;
            background-position: center top;
            background-attachment: fixed;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        h1 { color: #a3d8f4; text-transform: uppercase; letter-spacing: 3px; font-size: 38px; margin-bottom: 5px; font-family: 'Georgia', serif; }
        .subtitle { color: #7ab0d5; font-size: 16px; margin-bottom: 50px; }
        .grid { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; }
        
        .card {
            background: rgba(7, 18, 33, 0.4);
            border: 1px solid rgba(28, 61, 90, 0.4);
            padding: 35px 25px;
            width: 180px;
            border-radius: 4px;
            backdrop-filter: blur(4px);
            transition: all 0.3s;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }
        .card:hover { border-color: #4cb5ff; transform: translateY(-3px); background: rgba(9, 23, 41, 0.7); }
        .card h3 { margin: 0; font-size: 20px; color: #fff; }
        
        .btn-dl {
            background: linear-gradient(180deg, #1b3a57, #0d2033);
            border: 1px solid #386b99;
            color: #fff;
            padding: 10px 20px;
            display: inline-block;
            margin-top: 25px;
            font-size: 12px;
            text-transform: uppercase;
            font-weight: bold;
            transition: all 0.3s;
        }
        .btn-dl:hover { border-color: #4cb5ff; box-shadow: 0 0 12px rgba(76,181,255,0.6); }
    </style>
</head>
<body>

    <div class="container">
        <h1>Téléchargement du Client</h1>
        <div class="subtitle">Sélectionnez la langue pour votre client 3.3.5a</div>

        <div class="grid">
            <div class="card"><h3>Français</h3><a href="#" target="_blank" class="btn-dl">Télécharger</a></div>
            <div class="card"><h3>English</h3><a href="#" target="_blank" class="btn-dl">Download</a></div>
            <div class="card"><h3>Español</h3><a href="#" target="_blank" class="btn-dl">Descargar</a></div>
            <div class="card"><h3>Deutsch</h3><a href="#" target="_blank" class="btn-dl">Download</a></div>
            <div class="card"><h3>Русский</h3><a href="#" target="_blank" class="btn-dl">Скачать</a></div>
        </div>
    </div>

</body>
</html>
